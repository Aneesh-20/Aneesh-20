<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 320" width="100%" height="100%">
  <!-- Gradients & Filters -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#150a08" />
      <stop offset="100%" stop-color="#241411" />
    </linearGradient>

    <!-- Terminal Background Gradient -->
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1d100d" />
      <stop offset="100%" stop-color="#140a08" />
    </linearGradient>

    <!-- Glowing Accent Gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e05a36" />
      <stop offset="50%" stop-color="#f5c75d" />
      <stop offset="100%" stop-color="#e05a36" />
    </linearGradient>

    <!-- Drop Shadow Filter for IDE Window -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="114%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#070303" flood-opacity="0.7" />
    </filter>

    <!-- Subtle Orange Glow Filter -->
    <filter id="orangeGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. Canvas Background -->
  <rect width="850" height="320" fill="url(#bgGrad)" rx="8" />

  <!-- Code Pattern/Grid Backdrop -->
  <g opacity="0.03">
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="850" height="320" fill="url(#grid)" />
  </g>

  <!-- Decorative Sunset light reflection -->
  <circle cx="800" cy="50" r="150" fill="#e05a36" opacity="0.15" filter="blur(40px)" />
  <circle cx="50" cy="280" r="100" fill="#f5c75d" opacity="0.1" filter="blur(30px)" />

  <!-- 2. Mac-Style IDE Window Mockup -->
  <g filter="url(#shadow)" transform="translate(45, 30)">
    <!-- Window Outer Border -->
    <rect width="760" height="258" fill="url(#termBg)" rx="10" stroke="#3e241f" stroke-width="1.5" />

    <!-- Window Title Bar -->
    <path d="M 0 10 A 10 10 0 0 1 10 0 L 750 0 A 10 10 0 0 1 760 10 L 760 36 L 0 36 Z" fill="#241411" stroke="#3e241f" stroke-width="0.5" />

    <!-- Control Dots (Red, Yellow, Green) -->
    <circle cx="20" cy="18" r="6" fill="#FF5F56" />
    <circle cx="40" cy="18" r="6" fill="#FFBD2E" />
    <circle cx="60" cy="18" r="6" fill="#27C93F" />

    <!-- Tab Section -->
    <path d="M 100 36 L 115 12 L 245 12 L 260 36 Z" fill="#1d100d" stroke="#3e241f" stroke-width="1" />
    <text x="180" y="27" font-family="'Inter', -apple-system, sans-serif" font-weight="600" font-size="11" fill="#F8F1E5" text-anchor="middle" opacity="0.8">analysis.py</text>
    <!-- Close Tab cross -->
    <text x="235" y="27" font-family="sans-serif" font-size="10" fill="#BFA89E" opacity="0.6">×</text>

    <!-- Path Info Text -->
    <text x="740" y="23" font-family="'Inter', -apple-system, sans-serif" font-size="11" fill="#BFA89E" text-anchor="end" opacity="0.5">aneesh@macbook: ~/workspace/aneesh-20</text>

    <!-- Panel Separator Line (Left: Terminal, Right: Code Editor) -->
    <line x1="330" y1="36" x2="330" y2="258" stroke="#3e241f" stroke-width="1.5" />

    <!-- Left Side: Terminal Emulator -->
    <g transform="translate(20, 55)">
      <!-- Line 1: Command prompt -->
      <text x="0" y="15" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#F5C75D">aneesh-20@macbook ~ % <tspan fill="#F8F1E5" font-weight="normal">python analysis.py</tspan></text>
      
      <!-- Line 2: Terminal Output -->
      <text x="0" y="38" font-family="'Courier New', monospace" font-size="12" fill="#BFA89E" opacity="0.8">> Loading dataset.csv... OK</text>
      
      <!-- Line 3: Terminal Output -->
      <text x="0" y="56" font-family="'Courier New', monospace" font-size="12" fill="#BFA89E" opacity="0.8">> Processing 14,820 rows... Done</text>

      <!-- Line 4: Stats accuracy -->
      <text x="0" y="85" font-family="'Courier New', monospace" font-size="12" fill="#E05A36" font-weight="bold" filter="url(#orangeGlow)">[success] <tspan fill="#F8F1E5" font-weight="normal">Accuracy: 98.4% 📈</tspan></text>
      <text x="0" y="105" font-family="'Courier New', monospace" font-size="12" fill="#F8F1E5" opacity="0.9">> Chart output.png saved!</text>

      <!-- Cursor -->
      <rect x="0" y="120" width="8" height="15" fill="#F5C75D" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Right Side: Code Editor -->
    <g transform="translate(350, 55)">
      <!-- Syntax Highlighted Python Code -->
      <!-- Line 1: Comment -->
      <text x="0" y="15" font-family="'Courier New', monospace" font-size="13" fill="#BFA89E" font-style="italic"># Querying database for student metrics...</text>

      <!-- Line 2: analyst = { -->
      <text x="0" y="38" font-family="'Courier New', monospace" font-size="13" fill="#F5C75D">analyst <tspan fill="#E05A36" font-weight="bold">=</tspan> {</text>

      <!-- Properties -->
      <!-- "name": "Aneesh T Narendaran" -->
      <text x="20" y="60" font-family="'Courier New', monospace" font-size="13" fill="#F5C75D">"name"<tspan fill="#E05A36">:</tspan> <tspan fill="#F8F1E5">"Aneesh T Narendaran"</tspan>,</text>

      <!-- "role": "Data Analyst" -->
      <text x="20" y="82" font-family="'Courier New', monospace" font-size="13" fill="#F5C75D">"role"<tspan fill="#E05A36">:</tspan> <tspan fill="#F8F1E5">"Data Analyst"</tspan>,</text>

      <!-- "skills": ["Python", "SQL", "Pandas", "Tableau"] -->
      <text x="20" y="104" font-family="'Courier New', monospace" font-size="13" fill="#F5C75D">"skills"<tspan fill="#E05A36">:</tspan> <tspan fill="#F8F1E5">[</tspan><tspan fill="#F5C75D">"Python"</tspan><tspan fill="#F8F1E5">, </tspan><tspan fill="#F5C75D">"SQL"</tspan><tspan fill="#F8F1E5">, </tspan><tspan fill="#F5C75D">"Pandas"</tspan><tspan fill="#F8F1E5">, </tspan><tspan fill="#F5C75D">"Tableau"</tspan><tspan fill="#F8F1E5">],</tspan></text>

      <!-- "focus": "Extracting insights" -->
      <text x="20" y="126" font-family="'Courier New', monospace" font-size="13" fill="#F5C75D">"focus"<tspan fill="#E05A36">:</tspan> <tspan fill="#F8F1E5">"Extracting insights"</tspan>,</text>

      <!-- "status": "Analyzing data..." -->
      <text x="20" y="148" font-family="'Courier New', monospace" font-size="13" fill="#F5C75D">"status"<tspan fill="#E05A36">:</tspan> <tspan fill="#F8F1E5">"Analyzing data..."</tspan></text>

      <!-- Closing Bracket } -->
      <text x="0" y="170" font-family="'Courier New', monospace" font-size="13" fill="#F5C75D">}</text>

      <!-- Glowing brackets accent -->
      <text x="280" y="175" font-family="'Courier New', monospace" font-size="28" fill="#E05A36" font-weight="bold" opacity="0.15" transform="scale(1.5)">{ }</text>
    </g>
  </g>
</svg>
