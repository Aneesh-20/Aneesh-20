<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 280" width="100%" height="100%">
  <!-- Definitions for gradients and filters -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#190e0c" />
      <stop offset="100%" stop-color="#2c1a16" />
    </linearGradient>

    <!-- Sun Glow (Radial) -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd56b" stop-opacity="1" />
      <stop offset="40%" stop-color="#f5ab35" stop-opacity="0.8" />
      <stop offset="70%" stop-color="#e05a36" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#231513" stop-opacity="0" />
    </radialGradient>

    <!-- Sun Core -->
    <linearGradient id="sunCore" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe17d" />
      <stop offset="100%" stop-color="#e05a36" />
    </linearGradient>

    <!-- Wave 1 (Deepest) -->
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3c221a" />
      <stop offset="50%" stop-color="#4a2a21" />
      <stop offset="100%" stop-color="#321b14" />
    </linearGradient>

    <!-- Wave 2 (Middle) -->
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a341e" />
      <stop offset="60%" stop-color="#93432a" />
      <stop offset="100%" stop-color="#642816" />
    </linearGradient>

    <!-- Wave 3 (Foreground) -->
    <linearGradient id="wave3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d35400" />
      <stop offset="40%" stop-color="#e67e22" />
      <stop offset="80%" stop-color="#f39c12" />
      <stop offset="100%" stop-color="#d35400" />
    </linearGradient>

    <!-- Wave 4 (Accent Foreground Wave) -->
    <linearGradient id="wave4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9f43" />
      <stop offset="100%" stop-color="#e05a36" />
    </linearGradient>

    <!-- Text Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#0e0706" flood-opacity="0.6"/>
    </filter>

    <!-- Grid Pattern Overlay for Tech feel -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- 1. Background -->
  <rect width="850" height="280" fill="url(#bgGrad)" />

  <!-- Grid Pattern Overlay -->
  <g opacity="0.04">
    <rect width="850" height="280" fill="url(#grid)" />
  </g>

  <!-- 2. Ambient Light / Sun Glow -->
  <circle cx="425" cy="180" r="220" fill="url(#sunGlow)" opacity="0.85" />
  
  <!-- 3. Rising Sun -->
  <circle cx="425" cy="160" r="70" fill="url(#sunCore)" />

  <!-- 4. Abstract Vector Waves (Warm Autumn Colors) -->
  <!-- Back Wave (Wave 1) -->
  <path d="M 0 280 L 0 210 Q 150 170, 320 220 T 640 190 Q 750 200, 850 180 L 850 280 Z" fill="url(#wave1)" />

  <!-- Middle Wave (Wave 2) -->
  <path d="M 0 280 L 0 230 Q 200 240, 380 200 T 700 230 Q 780 210, 850 240 L 850 280 Z" fill="url(#wave2)" opacity="0.9" />

  <!-- Foreground Wave (Wave 3) -->
  <path d="M 0 280 L 0 260 Q 100 220, 250 250 T 550 230 Q 700 260, 850 220 L 850 280 Z" fill="url(#wave3)" opacity="0.95" />

  <!-- Front Detail Accent Wave (Wave 4) -->
  <path d="M 0 280 L 0 270 Q 180 250, 360 275 T 720 260 Q 790 270, 850 255 L 850 280 Z" fill="url(#wave4)" opacity="0.45" />

  <!-- Sparkles in Sky -->
  <g fill="#ffd56b" opacity="0.7">
    <circle cx="150" cy="60" r="1.5" />
    <circle cx="280" cy="40" r="1" />
    <circle cx="120" cy="100" r="1" />
    <circle cx="680" cy="50" r="2" />
    <circle cx="780" cy="80" r="1.5" />
    <circle cx="580" cy="70" r="1" />
    <circle cx="220" cy="130" r="1" />
    <circle cx="730" cy="120" r="1.2" />
  </g>

  <!-- 5. Typography -->
  <style>
    .welcome-text {
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
      font-weight: 800;
      font-size: 38px;
      fill: #F8F1E5;
      letter-spacing: 2px;
    }
    .subtitle-text {
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 16px;
      fill: #F5C75D;
      letter-spacing: 4px;
    }
    .desc-text {
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 300;
      font-size: 11px;
      fill: #BFA89E;
      letter-spacing: 1px;
    }
  </style>

  <text x="50%" y="105" text-anchor="middle" class="welcome-text" filter="url(#shadow)">CREATIVE DEVELOPER</text>
  <text x="50%" y="135" text-anchor="middle" class="subtitle-text" filter="url(#shadow)">Welcome to my digital garden</text>
  
  <text x="50%" y="272" text-anchor="middle" class="desc-text" opacity="0.6">✦ CRAFTING DIGITAL EXPERIENCES WITH PASSION ✦</text>
</svg>
